AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Rearc Quest Part 4 Step 3 - SQS-triggered Lambda that runs Part 3 analysis
  (join BLS + population data, filter on PRS30006032 / Q01, log results).

Parameters:
  QueueArn:
    Type: String
    Description: ARN of the SQS queue created in Part 4 Step 2
    Default: arn:aws:sqs:us-east-2:075550799614:population-events

Resources:

  AnalysisLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject]
                Resource: "arn:aws:s3:::demo-dk/*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: "arn:aws:s3:::demo-dk"
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !Ref QueueArn

  AnalysisLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-analysis"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AnalysisLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          BUCKET: demo-dk
          BLS_KEY: inbound/pr.data.0.Current
          POP_KEY: inbound/datausa_population.json
      Code:
        ZipFile: |
          import csv, json, io, os, logging
          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          BUCKET  = os.environ['BUCKET']
          BLS_KEY = os.environ['BLS_KEY']
          POP_KEY = os.environ['POP_KEY']

          SERIES_ID = 'PRS30006032'
          PERIOD    = 'Q01'
          MIN_YEAR  = 2013
          MAX_YEAR  = 2018

          s3 = boto3.client('s3')

          def read_bls():
              """Read BLS tab-separated file, return list of dicts."""
              obj = s3.get_object(Bucket=BUCKET, Key=BLS_KEY)
              text = obj['Body'].read().decode('utf-8')
              reader = csv.DictReader(io.StringIO(text), delimiter='\t')
              rows = []
              for row in reader:
                  cleaned = {k.strip(): v.strip() if v else v for k, v in row.items()}
                  rows.append(cleaned)
              return rows

          def read_population():
              """Read population JSON, aggregate by year."""
              obj = s3.get_object(Bucket=BUCKET, Key=POP_KEY)
              payload = json.loads(obj['Body'].read().decode('utf-8'))
              records = payload.get('data', payload)

              pop_by_year = {}
              for rec in records:
                  year = int(rec['Year'])
                  pop  = float(rec['Population'])
                  if MIN_YEAR <= year <= MAX_YEAR:
                      pop_by_year[year] = pop_by_year.get(year, 0) + pop
              return pop_by_year

          def handler(event, context):
              logger.info("SQS trigger received %d record(s)", len(event.get('Records', [])))

              bls_rows    = read_bls()
              pop_by_year = read_population()

              # Part 3: filter BLS for series_id PRS30006032, period Q01,
              #          join with population on year
              results = []
              for row in bls_rows:
                  sid = row.get('series_id', '')
                  if not sid.startswith(SERIES_ID):
                      continue
                  if row.get('period', '') != PERIOD:
                      continue
                  try:
                      year = int(row['year'])
                  except (ValueError, KeyError):
                      continue
                  if year < MIN_YEAR or year > MAX_YEAR:
                      continue
                  pop = pop_by_year.get(year)
                  if pop is not None:
                      results.append({
                          'year':       year,
                          'series_id':  sid,
                          'period':     PERIOD,
                          'value':      row.get('value', ''),
                          'Population': pop,
                      })

              results.sort(key=lambda r: r['year'])

              logger.info("=== Part 3 Report: BLS + Population ===")
              logger.info("%-6s %-14s %-8s %-8s %s", 'year', 'series_id', 'period', 'value', 'Population')
              for r in results:
                  logger.info("%-6d %-14s %-8s %-8s %.1f",
                              r['year'], r['series_id'], r['period'],
                              r['value'], r['Population'])

              logger.info("=== End of report (%d rows) ===", len(results))
              return {"status": "ok", "rows": len(results)}

  # Wire the SQS queue as an event source for this Lambda
  SqsEventMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !Ref QueueArn
      FunctionName: !GetAtt AnalysisLambda.Arn
      BatchSize: 1
      Enabled: true

Outputs:
  AnalysisLambdaName:
    Value: !Ref AnalysisLambda
  AnalysisLambdaArn:
    Value: !GetAtt AnalysisLambda.Arn
