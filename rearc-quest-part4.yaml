AWSTemplateFormatVersion: "2010-09-09"
Description: Rearc Quest Part 4 Step 1 - daily Lambda running Part 1 + Part 2.

Parameters:
  ScheduleExpression:
    Type: String
    Default: rate(1 day)

Mappings:
  Config:
    S3:
      BucketName: rearc-demo-dk
      KeyPrefix: inbound/

Resources:

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: "arn:aws:s3:::rearc-demo-dk"
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject]
                Resource: "arn:aws:s3:::rearc-demo-dk/*"

  QuestLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-quest"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          BUCKET: rearc-demo-dk
          PREFIX: inbound/
      Code:
        ZipFile: |
          import json, hashlib, urllib.request
          from io import BytesIO
          import boto3
          from botocore.exceptions import ClientError

          # Port of sync_to_s3.py: requests -> urllib so this works inline
          # in Lambda (requests is not in the AWS Lambda Python runtime).
          # All conditional-write logic preserved.

          def sync_file_to_s3(url, bucket, s3_key, output_file=None):
              output_file = url.split('/')[-1] if not output_file else output_file

              headers = {
                  'User-Agent': 'RearcDemo/1.0 (contact: intrepid_cool_lady@yahoo.com)'
              }

              s3_client = boto3.client('s3')

              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  content = resp.read()
              new_md5 = hashlib.md5(content).hexdigest()

              try:
                  head = s3_client.head_object(Bucket=bucket, Key=f"{s3_key}/{output_file}")
                  current_etag = head["ETag"].strip('"')
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      current_etag = None
                      print(f"No existing {output_file} file. Will attempt to create.")
                  else:
                      raise

              if current_etag is None:
                  try:
                      s3_client.put_object(
                          Bucket=bucket,
                          Key=f"{s3_key}/{output_file}",
                          Body=BytesIO(content),
                          IfNoneMatch="*",
                      )
                      print("Files written successfully.")
                  except ClientError as e:
                      if e.response["Error"]["Code"] == "PreconditionFailed":
                          print("Race condition detected. Someone else is attempting to write the file.")
                      raise

              elif current_etag == new_md5:
                  print(f"File is present and content is identical. No update needed.")

              else:
                  try:
                      s3_client.put_object(
                          Bucket=bucket,
                          Key=f"{s3_key}/{output_file}",
                          Body=BytesIO(content),
                          IfMatch=current_etag,
                      )
                      print(f"File is present but content differs. Uploading to {output_file} with new content.")
                  except ClientError as e:
                      if e.response["Error"]["Code"] == "PreconditionFailed":
                          print(f"File is present and content differs. Someone else updated it first.")
                      raise

          def handler(event, context):
              bucket = 'rearc-demo-dk'
              s3_key = 'inbound'

              url = 'https://download.bls.gov/pub/time.series/pr/pr.data.0.Current'
              sync_file_to_s3(url, bucket, s3_key)

              url = ("https://api.datausa.io/tesseract/data.jsonrecords"
                     "?cube=acs_yg_total_population_5&drilldowns=State,Year&measures=Population")
              sync_file_to_s3(url, bucket, s3_key, output_file='datausa_population.json')

              return {"status": "ok"}

  DailyRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: QuestLambdaTarget
          Arn: !GetAtt QuestLambda.Arn

  InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuestLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyRule.Arn

  # Part 4 Step 2: SQS queue populated every time the JSON file is written to S3.
  PopulationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-population-events"
      MessageRetentionPeriod: 345600   # 4 days
      VisibilityTimeout: 60

  # Allow the S3 bucket to publish events to this queue.
  # Condition scopes the trust to the specific bucket + this account.
  PopulationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PopulationQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3ToSendMessages
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PopulationQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: "arn:aws:s3:::rearc-demo-dk"
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

Outputs:
  LambdaName:
    Value: !Ref QuestLambda
  PopulationQueueUrl:
    Value: !Ref PopulationQueue
  PopulationQueueArn:
    Value: !GetAtt PopulationQueue.Arn
